allowBuilds:
  # required by vitest's transformer
  esbuild: true
  # sharp ships a prebuilt libvips binary; opt into the install script so it lands in node_modules
  sharp: true
  # required by @fohte/eslint-config -> eslint-plugin-import-x for "@/*" resolution
  unrs-resolver: true

# Dodge short-lived supply-chain attacks (e.g. shai-hulud, tinycolor) by
# holding off freshly published versions. Unit is minutes; 10080 = 7 days.
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@aws-sdk/*'
  - '@smithy/*'
  - '@typescript-eslint/*'
  - '@fohte/*'
  - js-yaml
  - obug
  - openapi3-ts
  - semver
  - vite
