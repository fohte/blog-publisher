# CouchDB + MinIO stack used by the E2E integration test (`pnpm test:e2e`).
# CouchDB stands in for the Obsidian LiveSync vault; MinIO stands in for the
# Cloudflare R2 bucket that ImageProcessor uploads variants to.
services:
  couchdb:
    image: couchdb:3.5.0
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
    ports:
      - '5984:5984'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://admin:password@127.0.0.1:5984/_up']
      interval: 2s
      timeout: 2s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:9000/minio/health/live']
      interval: 2s
      timeout: 2s
      retries: 30
