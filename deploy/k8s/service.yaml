apiVersion: v1
kind: Service
metadata:
  name: blog-publisher
  labels:
    app: blog-publisher
spec:
  # ClusterIP keeps the service reachable only from inside the cluster; the slack-bot
  # plugin calls it over the cluster network with a bearer token.
  type: ClusterIP
  selector:
    app: blog-publisher
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
